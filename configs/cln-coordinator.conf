# CLN coordinator node — regtest
# Mounted read-only at /etc/cln-coordinator.conf in the cln-coordinator container.

network=regtest

# Bitcoin Core backend
bitcoin-rpcuser=user
bitcoin-rpcpassword=password
bitcoin-rpcconnect=bitcoind
bitcoin-rpcport=18443

# hold plugin (BoltzExchange/hold, binary installed in Dockerfile.cln)
plugin=/usr/local/bin/hold

# Listen for peer connections
addr=0.0.0.0:9735

# CLNRest HTTP API (optional — pyln-client uses unix socket directly)
clnrest-port=3010
clnrest-protocol=http
clnrest-host=0.0.0.0

log-level=info
